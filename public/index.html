<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSwap Campus</title>
    <style>
      :root {
        --bg-primary: #0a0f39;
        --bg-secondary: #151f65;
        --surface: rgba(255, 255, 255, 0.96);
        --surface-soft: rgba(255, 255, 255, 0.88);
        --text-primary: #11183b;
        --text-muted: #5f678f;
        --primary: #5f6cf5;
        --primary-strong: #3a4be0;
        --accent: #ff9d52;
        --accent-soft: rgba(255, 159, 82, 0.15);
        --border: rgba(20, 35, 90, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Arial, sans-serif;
        color: var(--text-primary);
        background:
          radial-gradient(
            circle at top left,
            rgba(95, 108, 245, 0.32),
            transparent 28%
          ),
          radial-gradient(
            circle at top right,
            rgba(255, 159, 82, 0.18),
            transparent 20%
          ),
          linear-gradient(135deg, #0d1441 0%, #172463 42%, #2a3b90 100%);
      }

      header {
        padding: 1.4rem 1rem 1rem;
        color: white;
      }

      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        max-width: 1180px;
        margin: 0 auto;
        flex-wrap: wrap;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: 0.01em;
      }

      .brand span {
        background: linear-gradient(135deg, #ffce6c, #ff8b5f);
        color: #0f1333;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .hero-copy {
        max-width: 900px;
        margin: 1rem auto 0;
        color: #ebf1ff;
        line-height: 1.75;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
      }

      .nav-links button {
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        padding: 0.75rem 1.1rem;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease;
      }

      .nav-links button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.45);
      }

      main {
        max-width: 1180px;
        margin: 1.6rem auto 2.2rem;
        padding: 0 1rem;
      }

      .page-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .page-title h2 {
        margin: 0;
        color: white;
        font-size: clamp(1.7rem, 2.2vw, 2.4rem);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 22px 60px rgba(12, 24, 64, 0.14);
        padding: 1.45rem;
      }

      .card + .card {
        margin-top: 1.15rem;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.45rem;
        font-weight: 700;
        color: var(--text-primary);
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(20, 35, 90, 0.12);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        color: var(--text-primary);
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(95, 108, 245, 0.74);
        box-shadow: 0 0 0 4px rgba(95, 108, 245, 0.12);
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      button {
        width: auto;
        border: none;
        border-radius: 18px;
        padding: 0.95rem 1.35rem;
        background: var(--primary);
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          box-shadow 0.18s ease;
      }

      button.secondaryBtn {
        background: transparent;
        color: var(--text-primary);
        border: 1px solid rgba(20, 35, 90, 0.12);
      }

      button:hover {
        transform: translateY(-1px);
        background: var(--primary-strong);
        box-shadow: 0 16px 28px rgba(44, 62, 185, 0.18);
      }

      button.secondaryBtn:hover {
        background: rgba(95, 108, 245, 0.08);
      }

      .horizontal {
        display: flex;
        gap: 0.85rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .small {
        color: var(--text-muted);
        line-height: 1.65;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.48rem 0.85rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #4a2b00;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(180px, 1fr));
        gap: 1rem;
      }

      .summary-card {
        padding: 1rem 1.25rem;
        background: linear-gradient(
          135deg,
          rgba(95, 108, 245, 0.12),
          rgba(255, 159, 82, 0.12)
        );
        border: 1px solid rgba(95, 108, 245, 0.14);
      }

      .summary-card h3 {
        margin: 0.35rem 0 0;
        font-size: 2rem;
      }

      .skill-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.85rem;
      }

      .skill-tags span {
        background: rgba(95, 108, 245, 0.14);
        color: #28345b;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        font-size: 0.88rem;
      }

      .footer {
        max-width: 1180px;
        margin: 0 auto;
        padding: 1.25rem 1rem 1.5rem;
        color: rgba(255, 255, 255, 0.76);
        text-align: center;
        font-size: 0.95rem;
      }

      .toast {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        background: rgba(15, 35, 108, 0.96);
        color: white;
        padding: 0.85rem 1.15rem;
        border-radius: 18px;
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
        display: none;
        z-index: 20;
      }

      @media (max-width: 860px) {
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .header-top,
        .page-title,
        .horizontal {
          flex-direction: column;
          align-items: flex-start;
        }

        .nav-links {
          width: 100%;
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <div class="brand">
          <span>KEVBENS</span>
          SkillSwap Campus
        </div>
        <div id="navLinks" class="nav-links"></div>
      </div>
      <p class="hero-copy">
        Discover campus skills, request help easily, and manage your community
        with a refreshed experience.
      </p>
    </header>
    <main>
      <div class="grid" id="views"></div>
    </main>
    <footer class="footer">
      &copy; <span id="copyright-year"></span> KEVBENS.ORG
    </footer>
    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
